<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Editor — Overlay & Adjustments</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0e0e11;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid #1e1e24;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.2rem; font-weight: 600; color: #fff; }
    header p { font-size: 0.8rem; color: #555; margin-top: 2px; }

    #download-btn {
      padding: 10px 24px;
      background: #fff;
      color: #0e0e11;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      display: none;
    }
    #download-btn:hover { opacity: 0.85; }

    .app {
      display: flex;
      height: calc(100vh - 73px);
    }

    /* SIDEBAR */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: #131317;
      border-right: 1px solid #1e1e24;
      overflow-y: auto;
      padding: 20px 16px;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 2px; }

    .section {
      margin-bottom: 24px;
    }

    .section-header {
      font-size: 0.7rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .control { margin-bottom: 14px; }

    .control label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #999;
      margin-bottom: 6px;
    }

    .control label span { color: #e0e0e0; font-weight: 500; }

    input[type="range"] {
      width: 100%;
      accent-color: #fff;
      height: 4px;
    }

    select {
      width: 100%;
      background: #0e0e11;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.85rem;
      padding: 9px 12px;
      outline: none;
      font-family: inherit;
      cursor: pointer;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0e0e11;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      padding: 8px 12px;
    }

    input[type="color"] {
      width: 28px; height: 28px;
      border: none; background: none;
      cursor: pointer; padding: 0; border-radius: 4px;
    }

    .color-hex { font-size: 0.85rem; color: #e0e0e0; font-family: monospace; }

    .text-input {
      width: 100%;
      background: #0e0e11;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.85rem;
      padding: 9px 12px;
      outline: none;
      font-family: inherit;
    }

    .text-input:focus { border-color: #444; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .toggle-row label { font-size: 0.85rem; color: #999; }

    .toggle {
      width: 36px; height: 20px;
      background: #2a2a2e;
      border-radius: 100px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
    }

    .toggle.on { background: #fff; }

    .toggle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: #0e0e11;
      border-radius: 50%;
      transition: left 0.2s;
    }

    .toggle.on::after { left: 19px; }

    .divider { height: 1px; background: #1e1e24; margin: 8px 0 20px; }

    /* CANVAS AREA */
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0e0e11;
      position: relative;
      overflow: hidden;
    }

    .upload-prompt {
      text-align: center;
      cursor: pointer;
    }

    .upload-prompt .icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
    }

    .upload-prompt h2 {
      font-size: 1.1rem;
      font-weight: 500;
      color: #fff;
      margin-bottom: 8px;
    }

    .upload-prompt p { font-size: 0.85rem; color: #555; }

    .upload-box {
      border: 1.5px dashed #2a2a2e;
      border-radius: 16px;
      padding: 48px 64px;
      transition: border-color 0.2s;
    }

    .upload-box:hover { border-color: #444; }

    #image-input { display: none; }

    #canvas-wrap {
      display: none;
      position: relative;
      max-width: 100%;
      max-height: 100%;
    }

    canvas#main-canvas {
      max-width: calc(100vw - 340px);
      max-height: calc(100vh - 120px);
      border-radius: 8px;
      display: block;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .before-after-label {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 100px;
      display: none;
    }

    #change-img {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.8rem;
      cursor: pointer;
      display: none;
      font-family: inherit;
    }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #fff; color: #0e0e11;
      padding: 12px 24px; border-radius: 100px;
      font-size: 0.9rem; font-weight: 500;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Image Editor</h1>
    <p>Overlay, adjust, and export — all in your browser</p>
  </div>
  <button id="download-btn" onclick="downloadImage()">Download PNG</button>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- OVERLAY -->
    <div class="section">
      <p class="section-header">Color Overlay</p>

      <div class="toggle-row">
        <label>Enable overlay</label>
        <button class="toggle" id="overlay-toggle" onclick="toggleOverlay()"></button>
      </div>

      <div class="control">
        <label>Color</label>
        <div class="color-row">
          <input type="color" id="overlay-color" value="#000000" oninput="updateColorHex(); render()">
          <span class="color-hex" id="overlay-hex">#000000</span>
        </div>
      </div>

      <div class="control">
        <label>Opacity <span id="opacity-val">40%</span></label>
        <input type="range" id="overlay-opacity" min="0" max="100" value="40" oninput="document.getElementById('opacity-val').textContent=this.value+'%'; render()">
      </div>

      <div class="control">
        <label>Blend Mode</label>
        <select id="blend-mode" onchange="render()">
          <option value="normal">Normal</option>
          <option value="multiply">Multiply</option>
          <option value="screen">Screen</option>
          <option value="overlay">Overlay</option>
          <option value="darken">Darken</option>
          <option value="lighten">Lighten</option>
          <option value="color-dodge">Color Dodge</option>
          <option value="color-burn">Color Burn</option>
          <option value="hard-light">Hard Light</option>
          <option value="soft-light">Soft Light</option>
        </select>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ADJUSTMENTS -->
    <div class="section">
      <p class="section-header">Adjustments</p>

      <div class="control">
        <label>Brightness <span id="brightness-val">100%</span></label>
        <input type="range" id="brightness" min="0" max="200" value="100" oninput="document.getElementById('brightness-val').textContent=this.value+'%'; render()">
      </div>

      <div class="control">
        <label>Contrast <span id="contrast-val">100%</span></label>
        <input type="range" id="contrast" min="0" max="200" value="100" oninput="document.getElementById('contrast-val').textContent=this.value+'%'; render()">
      </div>

      <div class="control">
        <label>Saturation <span id="saturation-val">100%</span></label>
        <input type="range" id="saturation" min="0" max="200" value="100" oninput="document.getElementById('saturation-val').textContent=this.value+'%'; render()">
      </div>

      <div class="control">
        <label>Blur <span id="blur-val">0px</span></label>
        <input type="range" id="blur" min="0" max="20" value="0" oninput="document.getElementById('blur-val').textContent=this.value+'px'; render()">
      </div>

      <div class="control">
        <label>Rotate <span id="rotate-val">0°</span></label>
        <input type="range" id="rotate" min="0" max="360" value="0" oninput="document.getElementById('rotate-val').textContent=this.value+'°'; render()">
      </div>
    </div>

    <div class="divider"></div>

    <!-- TEXT OVERLAY -->
    <div class="section">
      <p class="section-header">Text Overlay</p>

      <div class="toggle-row">
        <label>Enable text</label>
        <button class="toggle" id="text-toggle" onclick="toggleText()"></button>
      </div>

      <div class="control">
        <input type="text" class="text-input" id="overlay-text" placeholder="Your text here…" oninput="render()">
      </div>

      <div class="control">
        <label>Font Size <span id="font-size-val">48px</span></label>
        <input type="range" id="font-size" min="12" max="120" value="48" oninput="document.getElementById('font-size-val').textContent=this.value+'px'; render()">
      </div>

      <div class="control">
        <label>Text Color</label>
        <div class="color-row">
          <input type="color" id="text-color" value="#ffffff" oninput="render()">
          <span class="color-hex">Text color</span>
        </div>
      </div>

      <div class="control">
        <label>Position</label>
        <select id="text-position" onchange="render()">
          <option value="center">Center</option>
          <option value="top">Top</option>
          <option value="bottom">Bottom</option>
          <option value="top-left">Top Left</option>
          <option value="top-right">Top Right</option>
          <option value="bottom-left">Bottom Left</option>
          <option value="bottom-right">Bottom Right</option>
        </select>
      </div>
    </div>

    <div class="divider"></div>

    <!-- RESET -->
    <button class="toggle-row" onclick="resetAll()" style="width:100%; background:#1e1e24; border:1px solid #2a2a2e; border-radius:8px; padding:10px; cursor:pointer; color:#999; font-size:0.85rem; font-family:inherit; justify-content:center;">
      Reset All
    </button>

  </div>

  <!-- CANVAS -->
  <div class="canvas-area">
    <div class="upload-prompt" id="upload-prompt" onclick="document.getElementById('image-input').click()">
      <div class="upload-box">
        <span class="icon">🖼</span>
        <h2>Drop an image or click to upload</h2>
        <p>PNG, JPG, WEBP, GIF supported</p>
      </div>
    </div>

    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
      <span class="before-after-label" id="ba-label">Editing</span>
      <button id="change-img" onclick="document.getElementById('image-input').click()">Change Image</button>
    </div>

    <input type="file" id="image-input" accept="image/*" onchange="loadImage(event)">
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let img = null;
  let overlayEnabled = false;
  let textEnabled = false;

  function toggleOverlay() {
    overlayEnabled = !overlayEnabled;
    document.getElementById('overlay-toggle').classList.toggle('on', overlayEnabled);
    render();
  }

  function toggleText() {
    textEnabled = !textEnabled;
    document.getElementById('text-toggle').classList.toggle('on', textEnabled);
    render();
  }

  function updateColorHex() {
    document.getElementById('overlay-hex').textContent = document.getElementById('overlay-color').value;
  }

  function loadImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      img = new Image();
      img.onload = function() {
        document.getElementById('upload-prompt').style.display = 'none';
        document.getElementById('canvas-wrap').style.display = 'block';
        document.getElementById('ba-label').style.display = 'block';
        document.getElementById('change-img').style.display = 'block';
        document.getElementById('download-btn').style.display = 'block';
        render();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function render() {
    if (!img) return;

    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');

    const rotate = parseInt(document.getElementById('rotate').value);
    const rad = rotate * Math.PI / 180;

    const isRotated90 = (rotate === 90 || rotate === 270);
    const w = isRotated90 ? img.height : img.width;
    const h = isRotated90 ? img.width : img.height;

    canvas.width = img.width;
    canvas.height = img.height;

    const brightness = document.getElementById('brightness').value;
    const contrast = document.getElementById('contrast').value;
    const saturation = document.getElementById('saturation').value;
    const blur = document.getElementById('blur').value;

    ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%) blur(${blur}px)`;

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(rad);
    ctx.drawImage(img, -img.width / 2, -img.height / 2);
    ctx.restore();
    ctx.filter = 'none';

    // Color overlay
    if (overlayEnabled) {
      const opacity = parseInt(document.getElementById('overlay-opacity').value) / 100;
      const color = document.getElementById('overlay-color').value;
      const blendMode = document.getElementById('blend-mode').value;
      ctx.globalCompositeOperation = blendMode;
      ctx.globalAlpha = opacity;
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
    }

    // Text overlay
    if (textEnabled) {
      const text = document.getElementById('overlay-text').value;
      const fontSize = parseInt(document.getElementById('font-size').value);
      const textColor = document.getElementById('text-color').value;
      const position = document.getElementById('text-position').value;

      if (text) {
        ctx.font = `bold ${fontSize}px Inter, system-ui, sans-serif`;
        ctx.fillStyle = textColor;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const pad = fontSize;
        let x = canvas.width / 2;
        let y = canvas.height / 2;

        if (position === 'top') { y = pad; ctx.textBaseline = 'top'; }
        else if (position === 'bottom') { y = canvas.height - pad; ctx.textBaseline = 'bottom'; }
        else if (position === 'top-left') { x = pad; y = pad; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; }
        else if (position === 'top-right') { x = canvas.width - pad; y = pad; ctx.textAlign = 'right'; ctx.textBaseline = 'top'; }
        else if (position === 'bottom-left') { x = pad; y = canvas.height - pad; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom'; }
        else if (position === 'bottom-right') { x = canvas.width - pad; y = canvas.height - pad; ctx.textAlign = 'right'; ctx.textBaseline = 'bottom'; }

        // Shadow for readability
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 8;
        ctx.fillText(text, x, y);
        ctx.shadowBlur = 0;
      }
    }
  }

  function downloadImage() {
    const canvas = document.getElementById('main-canvas');
    const link = document.createElement('a');
    link.download = 'edited-image.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('Downloaded!');
  }

  function resetAll() {
    document.getElementById('overlay-opacity').value = 40;
    document.getElementById('opacity-val').textContent = '40%';
    document.getElementById('brightness').value = 100;
    document.getElementById('brightness-val').textContent = '100%';
    document.getElementById('contrast').value = 100;
    document.getElementById('contrast-val').textContent = '100%';
    document.getElementById('saturation').value = 100;
    document.getElementById('saturation-val').textContent = '100%';
    document.getElementById('blur').value = 0;
    document.getElementById('blur-val').textContent = '0px';
    document.getElementById('rotate').value = 0;
    document.getElementById('rotate-val').textContent = '0°';
    document.getElementById('overlay-color').value = '#000000';
    document.getElementById('overlay-hex').textContent = '#000000';
    document.getElementById('blend-mode').value = 'normal';
    document.getElementById('overlay-text').value = '';
    document.getElementById('font-size').value = 48;
    document.getElementById('font-size-val').textContent = '48px';
    overlayEnabled = false;
    textEnabled = false;
    document.getElementById('overlay-toggle').classList.remove('on');
    document.getElementById('text-toggle').classList.remove('on');
    render();
    showToast('Reset done');
  }

  // Drag and drop
  const canvasArea = document.querySelector('.canvas-area');
  canvasArea.addEventListener('dragover', e => { e.preventDefault(); });
  canvasArea.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const fakeEvent = { target: { files: [file], value: '' } };
      loadImage(fakeEvent);
    }
  });

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
